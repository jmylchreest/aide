{{define "content"}}
<h2>Findings</h2>
<input type="search" id="global-filter" placeholder="Filter all columns..." class="search-input">
<div id="tbl"></div>
<script>
fetch("/api/instances/{{.Project}}/findings?limit=500")
  .then(r => r.json())
  .then(data => {
    var tbl = new Tabulator("#tbl", {
      data: data.findings || [],
      layout: "fitColumns",
      pagination: true,
      paginationSize: 50,
      paginationSizeSelector: [25, 50, 100],
      paginationCounter: "rows",
      headerFilterLiveFilterDelay: 200,
      rowHeight: 28,
      columns: [
        {title:"Severity", field:"severity", headerFilter:"list", headerFilterParams:{valuesLookup:true}, width:80, formatter:function(c){var v=c.getValue();return '<span class="severity-'+v+'">'+v+'</span>'}},
        {title:"Analyzer", field:"analyzer", headerFilter:"list", headerFilterParams:{valuesLookup:true}, width:100},
        {title:"Category", field:"category", headerFilter:"list", headerFilterParams:{valuesLookup:true}, width:100},
        {title:"File", field:"file_path", headerFilter:"input", formatter:function(c){return '<code>'+c.getValue()+'</code>'}},
        {title:"Line", field:"line", width:60, sorter:"number"},
        {title:"Title", field:"title", headerFilter:"input", formatter:function(c){var v=c.getValue()||""; return v.length>150 ? v.substring(0,150)+"..." : v;}},
      ],
    });
    var filterEl = document.getElementById("global-filter");
    var applyFilter = function(v){ v=v.toLowerCase(); if(!v){tbl.clearFilter();return;} tbl.setFilter(function(d){return JSON.stringify(d).toLowerCase().includes(v);}); };
    filterEl.addEventListener("input", function(e){ applyFilter(e.target.value); });
    var urlQ = new URLSearchParams(window.location.search).get("q");
    if (urlQ) { filterEl.value = urlQ; applyFilter(urlQ); }
  });
</script>
{{end}}
