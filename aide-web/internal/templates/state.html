{{define "content"}}
<h2>State</h2>
<input type="search" id="global-filter" placeholder="Filter all columns..." class="search-input">
<div id="tbl"></div>
<script>
fetch("/api/instances/{{.Project}}/state")
  .then(r => r.json())
  .then(data => {
    var tbl = new Tabulator("#tbl", {
      data: data.states || [],
      layout: "fitColumns",
      pagination: true,
      paginationSize: 50,
      paginationSizeSelector: [25, 50, 100],
      paginationCounter: "rows",
      headerFilterLiveFilterDelay: 200,
      rowHeight: 28,
      columns: [
        {title:"Key", field:"key", headerFilter:"input", formatter:function(c){return '<code>'+c.getValue()+'</code>'}},
        {title:"Value", field:"value", formatter:function(c){var v=c.getValue()||""; return v.length>150 ? v.substring(0,150)+"..." : v;}, headerFilter:"input"},
        {title:"Agent", field:"agent", headerFilter:"list", headerFilterParams:{valuesLookup:true}, width:120},
        {title:"", width:70, headerSort:false, formatter:function(){return '<span class="btn-action" title="Edit">✎</span> <span class="btn-action danger" title="Delete">✕</span>'}, cellClick:function(e,cell){var t=e.target;if(t.title==="Delete"&&confirm("Delete '"+cell.getRow().getData().key+"'?"))cell.getRow().delete()}},
      ],
    });
    var filterEl = document.getElementById("global-filter");
    var applyFilter = function(v){ v=v.toLowerCase(); if(!v){tbl.clearFilter();return;} tbl.setFilter(function(d){return JSON.stringify(d).toLowerCase().includes(v);}); };
    filterEl.addEventListener("input", function(e){ applyFilter(e.target.value); });
    var urlQ = new URLSearchParams(window.location.search).get("q");
    if (urlQ) { filterEl.value = urlQ; applyFilter(urlQ); }
  });
</script>
{{end}}
