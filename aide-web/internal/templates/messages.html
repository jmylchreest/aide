{{define "content"}}
<h2>Messages</h2>
<input type="search" id="global-filter" placeholder="Filter all columns..." class="search-input">
<div id="tbl"></div>
<script>
fetch("/api/instances/{{.Project}}/messages")
  .then(r => r.json())
  .then(data => {
    var tbl = new Tabulator("#tbl", {
      data: data.messages || [],
      layout: "fitColumns",
      pagination: true,
      paginationSize: 50,
      paginationSizeSelector: [25, 50, 100],
      paginationCounter: "rows",
      headerFilterLiveFilterDelay: 200,
      rowHeight: 28,
      columns: [
        {title:"ID", field:"id", width:60, sorter:"number"},
        {title:"From", field:"from", headerFilter:"list", headerFilterParams:{valuesLookup:true}, width:120},
        {title:"To", field:"to", headerFilter:"list", headerFilterParams:{valuesLookup:true}, width:120},
        {title:"Content", field:"content", headerFilter:"input", formatter:function(c){var v=c.getValue()||""; return v.length>150 ? v.substring(0,150)+"..." : v;}},
        {title:"Type", field:"type", headerFilter:"list", headerFilterParams:{valuesLookup:true}, width:80},
      ],
    });
    var filterEl = document.getElementById("global-filter");
    var applyFilter = function(v){ v=v.toLowerCase(); if(!v){tbl.clearFilter();return;} tbl.setFilter(function(d){return JSON.stringify(d).toLowerCase().includes(v);}); };
    filterEl.addEventListener("input", function(e){ applyFilter(e.target.value); });
    var urlQ = new URLSearchParams(window.location.search).get("q");
    if (urlQ) { filterEl.value = urlQ; applyFilter(urlQ); }
  });
</script>
{{end}}
