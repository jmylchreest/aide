syntax = "proto3";

package aidememory;

option go_package = "github.com/jmylchreest/aide/aide/pkg/grpcapi";

import "google/protobuf/timestamp.proto";

// =============================================================================
// Memory Service
// =============================================================================

service MemoryService {
  rpc Add(MemoryAddRequest) returns (MemoryAddResponse);
  rpc Get(MemoryGetRequest) returns (MemoryGetResponse);
  rpc Search(MemorySearchRequest) returns (MemorySearchResponse);
  rpc List(MemoryListRequest) returns (MemoryListResponse);
  rpc Delete(MemoryDeleteRequest) returns (MemoryDeleteResponse);
  rpc Clear(MemoryClearRequest) returns (MemoryClearResponse);
  rpc Touch(MemoryTouchRequest) returns (MemoryTouchResponse);
}

message Memory {
  string id = 1;
  string category = 2;
  string content = 3;
  repeated string tags = 4;
  float priority = 5;
  string plan = 6;
  string agent = 7;
  string namespace = 8;  // Swarm scope (empty = global)
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  uint32 access_count = 11;                    // Number of times this memory was retrieved
  google.protobuf.Timestamp last_accessed = 12; // Last time this memory was read/searched
}

message MemoryAddRequest {
  string content = 1;
  string category = 2;
  repeated string tags = 3;
}

message MemoryAddResponse {
  Memory memory = 1;
}

message MemoryGetRequest {
  string id = 1;
}

message MemoryGetResponse {
  Memory memory = 1;
}

message MemorySearchRequest {
  string query = 1;
  int32 limit = 2;
  string category = 3;
}

message MemorySearchResponse {
  repeated Memory memories = 1;
}

message MemoryListRequest {
  string category = 1;
  int32 limit = 2;
}

message MemoryListResponse {
  repeated Memory memories = 1;
}

message MemoryDeleteRequest {
  string id = 1;
}

message MemoryDeleteResponse {
  bool success = 1;
}

message MemoryClearRequest {}

message MemoryClearResponse {
  int32 count = 1;
}

message MemoryTouchRequest {
  repeated string ids = 1; // Memory IDs to mark as accessed
}

message MemoryTouchResponse {
  int32 touched = 1; // Number of memories touched
}

// =============================================================================
// State Service
// =============================================================================

service StateService {
  rpc Get(StateGetRequest) returns (StateGetResponse);
  rpc Set(StateSetRequest) returns (StateSetResponse);
  rpc List(StateListRequest) returns (StateListResponse);
  rpc Delete(StateDeleteRequest) returns (StateDeleteResponse);
  rpc Clear(StateClearRequest) returns (StateClearResponse);
  rpc Cleanup(StateCleanupRequest) returns (StateCleanupResponse);
}

message State {
  string key = 1;
  string value = 2;
  string agent = 3;
  google.protobuf.Timestamp updated_at = 4;
}

message StateGetRequest {
  string key = 1;
  string agent_id = 2;  // Optional: for per-agent state
}

message StateGetResponse {
  State state = 1;
  bool found = 2;
}

message StateSetRequest {
  string key = 1;
  string value = 2;
  string agent_id = 3;  // Optional: for per-agent state
}

message StateSetResponse {
  State state = 1;
}

message StateListRequest {
  string agent_id = 1;  // Optional: filter by agent
}

message StateListResponse {
  repeated State states = 1;
}

message StateDeleteRequest {
  string key = 1;
}

message StateDeleteResponse {
  bool success = 1;
}

message StateClearRequest {
  string agent_id = 1;  // Optional: clear only agent's state
}

message StateClearResponse {
  int32 count = 1;
}

message StateCleanupRequest {
  string max_age = 1;  // Duration string (e.g., "1h", "24h")
}

message StateCleanupResponse {
  int32 count = 1;
}

// =============================================================================
// Decision Service
// =============================================================================

service DecisionService {
  rpc Set(DecisionSetRequest) returns (DecisionSetResponse);
  rpc Get(DecisionGetRequest) returns (DecisionGetResponse);
  rpc List(DecisionListRequest) returns (DecisionListResponse);
  rpc History(DecisionHistoryRequest) returns (DecisionHistoryResponse);
  rpc Delete(DecisionDeleteRequest) returns (DecisionDeleteResponse);
  rpc Clear(DecisionClearRequest) returns (DecisionClearResponse);
}

message Decision {
  string topic = 1;
  string decision = 2;
  string rationale = 3;
  string details = 4;              // Full content: schemas, code, specs
  repeated string references = 5;  // External links, docs, related files
  string decided_by = 6;
  google.protobuf.Timestamp created_at = 7;
}

message DecisionSetRequest {
  string topic = 1;
  string decision = 2;
  string rationale = 3;
  string details = 4;              // Full content: schemas, code, specs
  repeated string references = 5;  // External links, docs, related files
  string decided_by = 6;
}

message DecisionSetResponse {
  Decision decision = 1;
}

message DecisionGetRequest {
  string topic = 1;
}

message DecisionGetResponse {
  Decision decision = 1;
  bool found = 2;
}

message DecisionListRequest {}

message DecisionListResponse {
  repeated Decision decisions = 1;
}

message DecisionHistoryRequest {
  string topic = 1;
}

message DecisionHistoryResponse {
  repeated Decision decisions = 1;
}

message DecisionDeleteRequest {
  string topic = 1;
}

message DecisionDeleteResponse {
  int32 count = 1;
}

message DecisionClearRequest {}

message DecisionClearResponse {
  int32 count = 1;
}

// =============================================================================
// Message Service (inter-agent communication)
// =============================================================================

service MessageService {
  rpc Send(MessageSendRequest) returns (MessageSendResponse);
  rpc List(MessageListRequest) returns (MessageListResponse);
  rpc Ack(MessageAckRequest) returns (MessageAckResponse);
  rpc Prune(MessagePruneRequest) returns (MessagePruneResponse);
}

message Message {
  uint64 id = 1;
  string from = 2;
  string to = 3;
  string content = 4;
  string type = 5;
  repeated string read_by = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp expires_at = 8;
}

message MessageSendRequest {
  string from = 1;
  string to = 2;  // Empty for broadcast
  string content = 3;
  string type = 4;
  int32 ttl_seconds = 5;  // Time-to-live, default 3600
}

message MessageSendResponse {
  Message message = 1;
}

message MessageListRequest {
  string agent_id = 1;
  bool include_read = 2;
}

message MessageListResponse {
  repeated Message messages = 1;
}

message MessageAckRequest {
  uint64 message_id = 1;
  string agent_id = 2;
}

message MessageAckResponse {
  bool success = 1;
}

message MessagePruneRequest {}

message MessagePruneResponse {
  int32 count = 1;
}

// =============================================================================
// Task Service (swarm orchestration)
// =============================================================================

service TaskService {
  rpc Create(TaskCreateRequest) returns (TaskCreateResponse);
  rpc Get(TaskGetRequest) returns (TaskGetResponse);
  rpc List(TaskListRequest) returns (TaskListResponse);
  rpc Claim(TaskClaimRequest) returns (TaskClaimResponse);
  rpc Complete(TaskCompleteRequest) returns (TaskCompleteResponse);
  rpc Update(TaskUpdateRequest) returns (TaskUpdateResponse);
  rpc Delete(TaskDeleteRequest) returns (TaskDeleteResponse);
  rpc Clear(TaskClearRequest) returns (TaskClearResponse);
}

message Task {
  string id = 1;
  string title = 2;
  string description = 3;
  string status = 4;  // pending, claimed, done, blocked
  string claimed_by = 5;
  string worktree = 6;
  string result = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp claimed_at = 9;
  google.protobuf.Timestamp completed_at = 10;
}

message TaskCreateRequest {
  string title = 1;
  string description = 2;
}

message TaskCreateResponse {
  Task task = 1;
}

message TaskGetRequest {
  string id = 1;
}

message TaskGetResponse {
  Task task = 1;
  bool found = 2;
}

message TaskListRequest {
  string status = 1;  // Optional: filter by status
}

message TaskListResponse {
  repeated Task tasks = 1;
}

message TaskClaimRequest {
  string task_id = 1;
  string agent_id = 2;
  string worktree = 3;
}

message TaskClaimResponse {
  Task task = 1;
  bool success = 2;
  string error = 3;
}

message TaskCompleteRequest {
  string task_id = 1;
  string result = 2;
}

message TaskCompleteResponse {
  Task task = 1;
  bool success = 2;
}

message TaskUpdateRequest {
  string task_id = 1;
  string status = 2;
  string result = 3;
}

message TaskUpdateResponse {
  Task task = 1;
  bool success = 2;
}

message TaskDeleteRequest {
  string id = 1;
}

message TaskDeleteResponse {
  bool success = 1;
}

message TaskClearRequest {
  string status = 1;  // Optional: filter by status (empty = all)
}

message TaskClearResponse {
  int32 count = 1;
}

// =============================================================================
// Code Service (symbol indexing and search)
// =============================================================================

service CodeService {
  rpc Search(CodeSearchRequest) returns (CodeSearchResponse);
  rpc Symbols(CodeSymbolsRequest) returns (CodeSymbolsResponse);
  rpc Stats(CodeStatsRequest) returns (CodeStatsResponse);
  rpc Index(CodeIndexRequest) returns (CodeIndexResponse);
  rpc Clear(CodeClearRequest) returns (CodeClearResponse);
  rpc TopReferences(CodeTopReferencesRequest) returns (CodeTopReferencesResponse);
  rpc SearchReferences(CodeSearchReferencesRequest) returns (CodeSearchReferencesResponse);
  rpc GetFileReferences(CodeGetFileReferencesRequest) returns (CodeSearchReferencesResponse);
  rpc GetContainingSymbol(CodeGetContainingSymbolRequest) returns (CodeGetContainingSymbolResponse);
  rpc ReadCheck(CodeReadCheckRequest) returns (CodeReadCheckResponse);
  rpc RunDeadCodeAnalysis(CodeRunDeadCodeAnalysisRequest) returns (CodeRunDeadCodeAnalysisResponse);
}

message Symbol {
  string id = 1;
  string name = 2;
  string kind = 3;          // function, method, class, interface, type
  string signature = 4;
  string doc_comment = 5;
  string file_path = 6;
  int32 start_line = 7;
  int32 end_line = 8;
  string language = 9;
  google.protobuf.Timestamp created_at = 10;
}

message CodeSearchRequest {
  string query = 1;
  string kind = 2;          // Optional: filter by kind
  string language = 3;      // Optional: filter by language
  string file_path = 4;     // Optional: filter by file path pattern
  int32 limit = 5;          // Max results (default 20)
}

message CodeSearchResponse {
  repeated Symbol symbols = 1;
}

message CodeSymbolsRequest {
  string file_path = 1;     // Path to the file
}

message CodeSymbolsResponse {
  repeated Symbol symbols = 1;
}

message CodeStatsRequest {}

message CodeStatsResponse {
  int32 files = 1;
  int32 symbols = 2;
  int32 references = 3;
}

message CodeIndexRequest {
  repeated string paths = 1;  // Paths to index (default: current directory)
  bool force = 2;             // Re-index even if file hasn't changed
}

message CodeIndexResponse {
  int32 files_indexed = 1;
  int32 symbols_indexed = 2;
  int32 files_skipped = 3;
}

message CodeClearRequest {}

message CodeClearResponse {
  int32 symbols_cleared = 1;
  int32 files_cleared = 2;
}

message CodeTopReferencesRequest {
  int32 limit = 1;   // Max results (default 25)
  string kind = 2;   // Optional: filter by symbol kind (function, method, type, etc.)
}

message CodeTopReferencesResponse {
  repeated SymbolRefCount symbols = 1;
}

message SymbolRefCount {
  string symbol = 1;  // Symbol name
  int32 count = 2;    // Number of references
  string kind = 3;    // Symbol kind (if resolved)
  string file = 4;    // File where symbol is defined (if resolved)
}

message CodeReference {
  string id = 1;
  string symbol_name = 2;  // Name of the referenced symbol
  string kind = 3;         // call, type_ref, import
  string file_path = 4;    // File where the reference occurs
  int32 line = 5;          // Line number (1-indexed)
  int32 column = 6;        // Column number (0-indexed)
  string context = 7;      // Surrounding code context
  string language = 8;     // Language of the file
  google.protobuf.Timestamp created_at = 9;
}

message CodeSearchReferencesRequest {
  string symbol_name = 1;  // Symbol name to find references for (required)
  string kind = 2;         // Optional: filter by reference kind (call, type_ref, import)
  string file_path = 3;    // Optional: filter by file path pattern
  int32 limit = 4;         // Max results (default 50)
}

message CodeSearchReferencesResponse {
  repeated CodeReference references = 1;
}

message CodeGetFileReferencesRequest {
  string file_path = 1;   // File path to get all references from
}

message CodeGetContainingSymbolRequest {
  string file_path = 1;   // File containing the line
  int32 line = 2;          // Line number (1-indexed)
}

message CodeGetContainingSymbolResponse {
  Symbol symbol = 1;       // The narrowest containing symbol, or nil if none
  bool found = 2;          // Whether a containing symbol was found
}

message CodeReadCheckRequest {
  string file_path = 1;   // File path to check (relative or absolute)
}

message CodeReadCheckResponse {
  bool indexed = 1;              // Whether the file exists in the code index
  bool fresh = 2;                // Whether the indexed version matches current disk mtime
  int32 symbols = 3;             // Number of symbols indexed for this file
  bool outline_available = 4;    // Whether code_outline would return useful data
  int32 estimated_tokens = 5;    // Estimated token count for the full file
}

message CodeRunDeadCodeAnalysisRequest {
  bool include_exported = 1;     // When true, do not skip symbols flagged as exported by the language pack
}

message CodeRunDeadCodeAnalysisResponse {
  int32 symbols_checked = 1;     // Number of symbols inspected by the analyzer
  int32 symbols_skipped = 2;     // Number of symbols excluded (entrypoints, exported methods, etc.)
  int32 findings_count = 3;      // Number of unreferenced symbols recorded as findings
  int64 duration_ms = 4;         // Analyzer wall-clock duration in milliseconds
}

// =============================================================================
// Findings Service
// =============================================================================

service FindingsService {
  rpc Add(FindingAddRequest) returns (FindingAddResponse);
  rpc Get(FindingGetRequest) returns (FindingGetResponse);
  rpc Delete(FindingDeleteRequest) returns (FindingDeleteResponse);
  rpc Search(FindingSearchRequest) returns (FindingSearchResponse);
  rpc List(FindingListRequest) returns (FindingSearchResponse);
  rpc GetFileFindings(FindingFileRequest) returns (FindingSearchResponse);
  rpc ClearAnalyzer(FindingClearAnalyzerRequest) returns (FindingClearAnalyzerResponse);
  rpc Stats(FindingStatsRequest) returns (FindingStatsResponse);
  rpc Clear(FindingClearRequest) returns (FindingClearResponse);
  rpc Accept(FindingAcceptRequest) returns (FindingAcceptResponse);
  rpc AcceptByFilter(FindingAcceptByFilterRequest) returns (FindingAcceptResponse);
}

message Finding {
  string id = 1;
  string analyzer = 2;
  string severity = 3;
  string category = 4;
  string file_path = 5;
  int32 line = 6;
  int32 end_line = 7;
  string title = 8;
  string detail = 9;
  map<string, string> metadata = 10;
  google.protobuf.Timestamp created_at = 11;
}

message FindingAddRequest {
  string analyzer = 1;
  string severity = 2;
  string category = 3;
  string file_path = 4;
  int32 line = 5;
  int32 end_line = 6;
  string title = 7;
  string detail = 8;
  map<string, string> metadata = 9;
}

message FindingAddResponse {
  Finding finding = 1;
}

message FindingGetRequest {
  string id = 1;
}

message FindingGetResponse {
  Finding finding = 1;
  bool found = 2;
}

message FindingDeleteRequest {
  string id = 1;
}

message FindingDeleteResponse {
  bool success = 1;
}

message FindingSearchRequest {
  string query = 1;
  string analyzer = 2;     // Optional: filter by analyzer
  string severity = 3;     // Optional: filter by severity
  string file_path = 4;    // Optional: filter by file path pattern
  string category = 5;     // Optional: filter by category
  int32 limit = 6;         // Max results (default 20)
}

message FindingSearchResponse {
  repeated Finding findings = 1;
}

message FindingListRequest {
  string analyzer = 1;     // Optional: filter by analyzer
  string severity = 2;     // Optional: filter by severity
  string file_path = 3;    // Optional: filter by file path pattern
  string category = 4;     // Optional: filter by category
  int32 limit = 5;         // Max results (default 100)
}

message FindingFileRequest {
  string file_path = 1;
}

message FindingClearAnalyzerRequest {
  string analyzer = 1;
}

message FindingClearAnalyzerResponse {
  int32 count = 1;
}

message FindingStatsRequest {}

message FindingStatsResponse {
  int32 total = 1;
  map<string, int32> by_analyzer = 2;
  map<string, int32> by_severity = 3;
}

message FindingClearRequest {}

message FindingClearResponse {
  bool success = 1;
}

message FindingAcceptRequest {
  repeated string ids = 1;  // Finding IDs to accept
}

message FindingAcceptByFilterRequest {
  string analyzer = 1;     // Optional: filter by analyzer
  string severity = 2;     // Optional: filter by severity
  string file_path = 3;    // Optional: filter by file path pattern
  string category = 4;     // Optional: filter by category
}

message FindingAcceptResponse {
  int32 count = 1;  // Number of findings accepted
}

// =============================================================================
// Survey Service
// =============================================================================

service SurveyService {
  rpc Add(SurveyAddRequest) returns (SurveyAddResponse);
  rpc Get(SurveyGetRequest) returns (SurveyGetResponse);
  rpc Delete(SurveyDeleteRequest) returns (SurveyDeleteResponse);
  rpc Search(SurveySearchRequest) returns (SurveySearchResponse);
  rpc List(SurveyListRequest) returns (SurveySearchResponse);
  rpc GetFileEntries(SurveyFileRequest) returns (SurveySearchResponse);
  rpc ClearAnalyzer(SurveyClearAnalyzerRequest) returns (SurveyClearAnalyzerResponse);
  rpc Stats(SurveyStatsRequest) returns (SurveyStatsResponse);
  rpc Clear(SurveyClearRequest) returns (SurveyClearResponse);
}

message SurveyEntry {
  string id = 1;
  string analyzer = 2;
  string kind = 3;
  string name = 4;
  string file_path = 5;
  string title = 6;
  string detail = 7;
  map<string, string> metadata = 8;
  google.protobuf.Timestamp created_at = 9;
}

message SurveyAddRequest {
  string analyzer = 1;
  string kind = 2;
  string name = 3;
  string file_path = 4;
  string title = 5;
  string detail = 6;
  map<string, string> metadata = 7;
}

message SurveyAddResponse {
  SurveyEntry entry = 1;
}

message SurveyGetRequest {
  string id = 1;
}

message SurveyGetResponse {
  SurveyEntry entry = 1;
  bool found = 2;
}

message SurveyDeleteRequest {
  string id = 1;
}

message SurveyDeleteResponse {
  bool success = 1;
}

message SurveySearchRequest {
  string query = 1;
  string analyzer = 2;     // Optional: filter by analyzer
  string kind = 3;         // Optional: filter by kind
  string file_path = 4;    // Optional: filter by file path pattern
  int32 limit = 5;         // Max results (default 20)
}

message SurveySearchResponse {
  repeated SurveyEntry entries = 1;
}

message SurveyListRequest {
  string analyzer = 1;     // Optional: filter by analyzer
  string kind = 2;         // Optional: filter by kind
  string file_path = 3;    // Optional: filter by file path pattern
  int32 limit = 4;         // Max results (default 100)
}

message SurveyFileRequest {
  string file_path = 1;
}

message SurveyClearAnalyzerRequest {
  string analyzer = 1;
}

message SurveyClearAnalyzerResponse {
  int32 count = 1;
}

message SurveyStatsRequest {}

message SurveyStatsResponse {
  int32 total = 1;
  map<string, int32> by_analyzer = 2;
  map<string, int32> by_kind = 3;
}

message SurveyClearRequest {}

message SurveyClearResponse {
  bool success = 1;
}

// =============================================================================
// Health Service
// =============================================================================

service HealthService {
  rpc Check(HealthCheckRequest) returns (HealthCheckResponse);
}

message HealthCheckRequest {}

message HealthCheckResponse {
  bool healthy = 1;
  string version = 2;
  string db_path = 3;
}

// =============================================================================
// Status Service (live server status for CLI)
// =============================================================================

service StatusService {
  rpc GetStatus(StatusRequest) returns (StatusResponse);
}

message StatusRequest {}

message StatusResponse {
  // Server info
  string version = 1;
  string uptime = 2;
  bool server_running = 3;

  // Watcher status
  StatusWatcher watcher = 4;

  // Code indexer status
  StatusCodeIndexer code_indexer = 5;

  // Findings status
  StatusFindings findings = 6;

  // MCP tools
  repeated StatusMCPTool mcp_tools = 7;

  // Survey status
  StatusSurvey survey = 8;

  // pprof URL (empty when pprof is not enabled or not compiled in)
  string pprof_url = 9;

  // Store sizes
  repeated StatusStore stores = 10;

  // Installed grammars
  repeated StatusGrammar grammars = 11;
}

message StatusWatcher {
  bool enabled = 1;
  repeated string paths = 2;
  int32 dirs_watched = 3;
  string debounce = 4;
  int32 pending_files = 5;
  repeated string subscribers = 6;
}

message StatusCodeIndexer {
  bool available = 1;
  string status = 2;
  int32 symbols = 3;
  int32 references = 4;
  int32 files = 5;
}

message StatusFindings {
  bool available = 1;
  int32 total = 2;
  map<string, int32> by_analyzer = 3;
  map<string, int32> by_severity = 4;
  map<string, StatusAnalyzer> analyzers = 5;
}

message StatusAnalyzer {
  string status = 1;
  string scope = 2;
  string last_run = 3;
  int32 findings = 4;
  string last_duration = 5;
}

message StatusMCPTool {
  string name = 1;
  string category = 2;
  int64 execution_count = 3;
}

message StatusSurvey {
  bool available = 1;
  int32 total = 2;
  map<string, int32> by_analyzer = 3;
  map<string, int32> by_kind = 4;
}

message StatusStore {
  string name = 1;
  string path = 2;
  int64 size = 3; // bytes
}

message StatusGrammar {
  string name = 1;
  string version = 2;
  bool built_in = 3;
}

// =============================================================================
// Token Service (estimated token tracking and intelligence)
// =============================================================================

service TokenService {
  rpc RecordTokenEvent(TokenEventRequest) returns (TokenEventResponse);
  rpc GetTokenStats(TokenStatsRequest) returns (TokenStatsResponse);
  rpc ListTokenEvents(TokenEventListRequest) returns (TokenEventListResponse);
}

message TokenEventRequest {
  string session_id = 1;
  string event_type = 2;     // read, outline_used, read_avoided, write, edit
  string tool = 3;           // Read, code_outline, code_symbols, Edit, Write
  string file_path = 4;
  int32 tokens = 5;          // estimated tokens
  int32 tokens_saved = 6;    // estimated tokens saved
}

message TokenEventResponse {
  string id = 1;
}

message TokenStatsRequest {
  string session_id = 1;     // optional: filter by session (empty = all)
}

message TokenStatsResponse {
  int32 total_read = 1;      // estimated tokens consumed by reads
  int32 total_saved = 2;     // estimated tokens saved
  int32 total_written = 3;   // estimated tokens output
  int32 event_count = 4;
  map<string, int32> by_tool = 5;
  map<string, int32> by_saving_type = 6;
  int32 sessions = 7;
}

message TokenEventListRequest {
  string session_id = 1;     // optional: filter by session
  int32 limit = 2;           // max results (default: 100)
}

message TokenEventListResponse {
  repeated TokenEventItem events = 1;
}

message TokenEventItem {
  string id = 1;
  string session_id = 2;
  google.protobuf.Timestamp timestamp = 3;
  string event_type = 4;
  string tool = 5;
  string file_path = 6;
  int32 tokens = 7;
  int32 tokens_saved = 8;
}
